<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор кредиту та депозиту</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Калькулятор кредиту та депозиту</h1>
    <p class="subtitle">Варіант 3: розрахунок загальної кількості грошових надходжень</p>

    <section class="form-card">
      <div class="row">
        <label for="mode">Режим</label>
        <select id="mode">
          <option value="credit">Кредит</option>
          <option value="deposit">Депозит</option>
        </select>
      </div>

      <div class="row">
        <label for="principal">Сума (грн)</label>
        <input id="principal" type="number" min="0" step="0.01" placeholder="Наприклад 10000" />
      </div>
      <div class="row">
        <label for="rate">Процентна ставка (річна %)</label>
        <input id="rate" type="number" min="0" step="0.01" placeholder="Наприклад 12" />
      </div>
      <div class="row">
        <label for="years">Термін (роки)</label>
        <input id="years" type="number" min="0" step="0.1" placeholder="Наприклад 3" />
      </div>
      <div class="row">
        <label for="monthly">Щомісячний платіж / внесок (грн)</label>
        <input id="monthly" type="number" min="0" step="0.01" placeholder="Наприклад 500" />
      </div>

      <div class="buttons">
        <button id="calculateBtn">Розрахувати</button>
        <button id="saveBtn" disabled>Зберегти результати у файл</button>
      </div>

      <div id="result" class="result"></div>
      <div id="message" class="message"></div>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
